version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=Stacks Quest Boards
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    restart: unless-stopped

  docs:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["python", "-m", "http.server", "8000"]
    profiles:
      - docs